<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #e2e8f0;
            font-family: sans-serif;
        }

        .container {
            text-align: center;
        }

        h2 {
            color: #475569;
            margin-top: 20px;
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- APP ICON SVG -->
        <svg width="400" height="400" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#4f46e5" />
                    <stop offset="100%" stop-color="#3730a3" />
                </linearGradient>
                <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
                    <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.25" />
                </filter>
            </defs>

            <!-- Squircle Background -->
            <rect x="32" y="32" width="448" height="448" rx="100" ry="100" fill="url(#bgGradient)" />

            <!-- Outer Ring -->
            <circle cx="256" cy="256" r="140" fill="none" stroke="white" stroke-width="24" opacity="0.9" />

            <!-- Graduation Cap (Stylized) -->
            <path d="M140 220 L256 160 L372 220 L256 280 Z" fill="white" />
            <path d="M140 220 L140 260 C140 310, 372 310, 372 260 L372 220" fill="none" stroke="white"
                stroke-width="0" /> <!-- Abstract bottom of cap -->

            <!-- Cap Tassel -->
            <path d="M372 220 L372 290" stroke="white" stroke-width="8" stroke-linecap="round" />
            <circle cx="372" cy="300" r="10" fill="#FFD700" />

            <!-- Compass Needle (Gold) -->
            <g transform="rotate(45, 256, 256)" filter="url(#shadow)">
                <!-- North (Gold) -->
                <path d="M256 116 L296 256 L256 256 Z" fill="#FFD700" />
                <path d="M256 116 L216 256 L256 256 Z" fill="#FDB931" /> <!-- Darker Gold side -->

                <!-- South (Silver/White) -->
                <path d="M256 396 L296 256 L256 256 Z" fill="#e2e8f0" />
                <path d="M256 396 L216 256 L256 256 Z" fill="#cbd5e1" />

                <!-- Center Pivot -->
                <circle cx="256" cy="256" r="20" fill="#1e1b4b" stroke="#FFD700" stroke-width="4" />
            </g>

        </svg>

        <h2>Student Success Navigator</h2>
        <p>Preview of Gold Compass Icon</p>
    </div>
</body>

</html>
