services:
  - type: web
    name: student-success-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GOOGLE_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: CANVAS_API_TOKEN
        sync: false
      - key: CANVAS_BASE_URL
        value: https://canvas.instructure.com/api/v1
