workflows:
  ios-release:
    name: iOS Release Build
    max_build_duration: 120
    instance_type: mac_mini_m1
    environment:
      groups:
        - apple_credentials
      vars:
        XCODE_WORKSPACE: "frontend/ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.studentsuccess.navigator"
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.studentsuccess.navigator
      node: 20.11.0
      xcode: 15.2
      cocoapods: default
    triggering:
      events:
        - push
        - tag
        - pull_request
      branch_patterns:
        - pattern: 'main'
          include: true
          source: true
        - pattern: 'release/*'
          include: true
          source: true
      tag_patterns:
        - pattern: 'v*.*.*'
          include: true
    scripts:
      - name: Install npm dependencies
        script: |
          cd frontend
          npm ci
      - name: Build web assets
        script: |
          cd frontend
          npm run build
      - name: Update Capacitor
        script: |
          cd frontend
          npx cap sync ios
      - name: Install CocoaPods dependencies
        script: |
          cd frontend/ios/App
          pod install
      - name: Set build number
        script: |
          cd frontend/ios/App
          agvtool new-version -all $(($(app-store-connect get-latest-build-number "$APP_STORE_CONNECT_ISSUER_ID" "$APP_STORE_CONNECT_KEY_IDENTIFIER" "$APP_STORE_CONNECT_PRIVATE_KEY" "$BUNDLE_ID") + 1))
      - name: Build iOS app
        script: |
          cd frontend
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - frontend/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      email:
        recipients:
          - your-email@example.com # Update with your email
        notify:
          success: true
          failure: true
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        # Uncomment below to auto-submit to App Store review (use with caution)
        # submit_to_app_store: true

  ios-development:
    name: iOS Development Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      groups:
        - apple_credentials
      vars:
        XCODE_WORKSPACE: "frontend/ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.studentsuccess.navigator"
      ios_signing:
        distribution_type: development
        bundle_identifier: com.studentsuccess.navigator
      node: 20.11.0
      xcode: 15.2
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'develop'
          include: true
          source: true
        - pattern: 'feature/*'
          include: true
          source: true
    scripts:
      - name: Install npm dependencies
        script: |
          cd frontend
          npm ci
      - name: Build web assets (development)
        script: |
          cd frontend
          npm run build
      - name: Update Capacitor
        script: |
          cd frontend
          npx cap sync ios
      - name: Install CocoaPods dependencies
        script: |
          cd frontend/ios/App
          pod install
      - name: Build iOS app (development)
        script: |
          cd frontend
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --config "Debug"
    artifacts:
      - frontend/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      email:
        recipients:
          - your-email@example.com # Update with your email
        notify:
          success: true
          failure: true
